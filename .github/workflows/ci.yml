name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cla:
    runs-on: ubuntu-latest

    steps:
      - name: Verify CLA agreement in PR body
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "${EVENT_NAME}" != "pull_request" ]; then
            echo "Not a pull_request event, skipping CLA body verification."
            exit 0
          fi

          if [ -z "${PR_BODY}" ]; then
            echo "PR body is empty. Please add: I agree to CLA"
            exit 1
          fi

          if ! printf '%s' "${PR_BODY}" | grep -Fqi "I agree to CLA"; then
            echo "Missing required CLA statement in PR body: I agree to CLA"
            exit 1
          fi

          echo "CLA statement found in PR body."

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare log directory
        run: mkdir -p artifacts

      - name: Install dependencies
        run: npm ci 2>&1 | tee artifacts/npm-ci.log
        shell: bash

      - name: Run lint
        run: npm run lint 2>&1 | tee artifacts/lint.log
        shell: bash

      - name: Run tests
        run: npm test 2>&1 | tee artifacts/test.log
        shell: bash

      - name: Build project
        run: npm run build 2>&1 | tee artifacts/build.log
        shell: bash

      - name: Upload logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: artifacts

  docs:
    runs-on: ubuntu-latest
    needs: [cla, build]
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated documentation
        run: npm run docs:check 2>&1 | tee docs-check.log
        shell: bash

      - name: Upload docs check logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-check-logs
          path: docs-check.log
